name: CI Triage Agent

"on":
  push:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: [self-hosted, ci-triage]
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        shell: bash
        run: |
          echo "::group::Build & Test"
          python3 << 'EOF' 2>&1 | tee -a build.log
          import sys, traceback
          try:
              raise RuntimeError("Undefined variable: foo")
          except Exception as e:
              with open("build.log", "w") as f:
                  f.write("Traceback:\n")
                  traceback.print_exc(file=f)
              print(f"FAIL: {e}", file=sys.stderr)
              sys.exit(1)
          EOF
          rc=${PIPESTATUS[0]}
          echo "::endgroup::"
          exit $rc

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 1

  triage:
    if: failure()
    needs: [test]
    runs-on: [self-hosted, ci-triage]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build log
        uses: actions/download-artifact@v4
        with:
          name: build-log

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ci-triage-agent
        run: pip install .

      - name: Run AI Triage
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'gemini' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.sha }}
          LOG_LINES: "200"
          LLM_TIMEOUT: "60"
        run: ci-triage-agent --log-file build.log
