name: CI Triage Agent

"on":
  push:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: [self-hosted, ci-triage]
    steps:
      - uses: actions/checkout@v4

      - name: Install dev dependencies
        run: |
          pip install -e ".[dev]" --break-system-packages 2>&1 | tail -5

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          python3 -m pytest tests/ -v 2>&1 | tee test-output.log

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.log
          retention-days: 1

  triage:
    if: failure()
    needs: [test]
    runs-on: [self-hosted, ci-triage]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download test log
        uses: actions/download-artifact@v4
        with:
          name: test-output

      - name: Install ci-triage-agent
        run: pip install -e . --break-system-packages 2>&1 | tail -3

      - name: Run AI Triage
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'gemini' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          COMMIT_SHA: ${{ github.sha }}
          LOG_LINES: "200"
          LLM_TIMEOUT: "60"
        run: ci-triage-agent --log-file test-output.log
